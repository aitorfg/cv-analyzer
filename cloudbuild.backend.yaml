substitutions:
  _REGION: europe-west1
  _SERVICE: cv-analyzer
  _IMAGE: europe-west1-docker.pkg.dev/$PROJECT_ID/app/backend

steps:
  - name: gcr.io/cloud-builders/docker
    dir: backend
    args: ["build", "-t", "${_IMAGE}:${TAG_NAME}", "."]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}:${TAG_NAME}"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args: ["run","deploy","${_SERVICE}",
           "--image","${_IMAGE}:${TAG_NAME}",
           "--region","${_REGION}",
           "--platform","managed",
           "--quiet"]
options:
  logging: CLOUD_LOGGING_ONLY
  
images:
  - "${_IMAGE}:${TAG_NAME}"